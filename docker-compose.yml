# Local Postgres with pgvector (Step 02). Requires Docker Desktop (or compatible engine).
#
# Env vars (passed to the official Postgres image as POSTGRES_*):
#   POSTGRES_USER     — database superuser name (default below: scripturelm)
#   POSTGRES_PASSWORD — superuser password (change for non-local use)
#   POSTGRES_DB       — database name created on first run
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f postgres
#
# Data persists in the named volume `postgres_data`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scripturelm-postgres
    restart: unless-stopped
    # Host port 5433 avoids clashing with a local PostgreSQL install on 5432 (common on dev machines).
    # Container still listens on 5432 internally; DATABASE_URL must use the host port you choose here.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: scripturelm
      POSTGRES_PASSWORD: scripturelm_dev_password
      POSTGRES_DB: scripturelm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scripturelm -d scripturelm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
